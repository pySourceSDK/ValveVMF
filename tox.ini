[tox]
envlist = py311,py312,py313,py314

# Only test against the interpreters a given machine actually has. CI pins
# one Python per matrix job and runs 'tox -e py', so this only affects local
# runs, where nobody has all four installed.
skip_missing_interpreters = true

requires =
    setuptools

[testenv]
deps =
    pytest
commands =
    pytest


[testenv:dev]
basepython = python3.13
deps =
    pytest
    pytest-cov
commands =
    coverage erase
    pytest --cov=valvevmf --cov-report html

[testenv:coverage]
basepython = python3.13
deps =
    pytest
    pytest-cov
    coverage-badge
commands =
    coverage erase
    pytest --cov=valvevmf --cov-report html
    coverage-badge -fo docs/source/coverage.svg

[testenv:docs]
basepython = python3.13
deps =
    sphinx
    pytest
    pytest-cov
    coverage-badge
commands =
    coverage erase
    pytest --cov=valvevmf --cov-report html
    coverage-badge -fo docs/source/coverage.svg
    python -m sphinx docs/source/ docs/build/
