name: CI

on:
  push:
    branches:
      - '*'
    tags:
     - 'v*'
  pull_request:
    branches:
      - '*'

jobs:

  test:
    name: Tests with tox + python 3.13
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

    - name: Test with tox
      run: tox -e py

  test-full:
    name: Full test suite
    runs-on: ${{ matrix.platform }}
    if: startsWith(github.event.ref, 'refs/tags/v')
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

    - name: Test with tox
      run: tox -e py

  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    needs: test-full
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install pypa/build
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Extract tag name
      id: tag
      run: echo "TAG_NAME=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

    - name: Update version in setup.py
      run: >-
        sed -i "s/{{VERSION_PLACEHOLDER}}/${{ steps.tag.outputs.TAG_NAME }}/g" setup.py

    - name: Build a binary wheel
      run: >-
        python -m build

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        # Re-running a release must not hard-fail on an already-uploaded
        # version. PyPI answers a duplicate upload with a 400, which used to
        # abort the job.
        skip-existing: true

  docs:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    # Deliberately not tied to build-n-publish: docs must still deploy when a
    # PyPI upload is skipped or fails, and doc fixes should go live without
    # waiting for a release.
    if: github.ref == 'refs/heads/main' || startsWith(github.event.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

    - name: Sphinx Doc build
      run: tox -e docs

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        publish_branch: gh-pages
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/build
        force_orphan: true
